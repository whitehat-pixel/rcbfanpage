<body>

<h1>RCB History Quiz</h1>

<div class="container">

<p id="question"></p>

<div id="answers"></div>

<button onclick="nextQuestion()">Next</button>

<p id="score"></p>

</div>

<script>

let quiz = [
{q:"When was RCB founded?",a:["2006","2007","2008","2009"],c:2},
{q:"Highest run scorer for RCB?",a:["Virat Kohli","Gayle","ABD","Faf"],c:0},
{q:"RCB home ground?",a:["Wankhede","Chinnaswamy","Eden","Kotla"],c:1},
{q:"RCB finals played?",a:["1","2","3","4"],c:2},
{q:"Mr 360?",a:["Kohli","ABD","Maxwell","Gayle"],c:1},
{q:"First RCB captain?",a:["Kohli","Dravid","Kumble","Taylor"],c:1},
{q:"Who scored 175*?",a:["Kohli","Gayle","ABD","Maxwell"],c:1},
{q:"RCB owner?",a:["Reliance","United Spirits","Tata","Adani"],c:1},
{q:"Team colors?",a:["Blue","Yellow","Red & Black","Green"],c:2},
{q:"Kohli 973 runs year?",a:["2015","2016","2017","2018"],c:1}
];

let index = 0;
let score = 0;

function loadQuestion(){

let q = quiz[index];
document.getElementById("question").innerText = q.q;

let ansHTML = "";

for(let i=0;i<q.a.length;i++){
ansHTML += `<div>
<input type="radio" name="ans" value="${i}"> ${q.a[i]}
</div>`;
}

document.getElementById("answers").innerHTML = ansHTML;

}

function nextQuestion(){

let selected = document.querySelector('input[name="ans"]:checked');

if(selected){

if(parseInt(selected.value) === quiz[index].c){
score++;
}

index++;

if(index < quiz.length){
loadQuestion();
}
else{
document.querySelector(".container").innerHTML =
`<h2>Your Score: ${score}/${quiz.length}</h2>`;
}

}

}

loadQuestion();

</script>
